<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentine's Day 💝</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe0ec, #ffd6e7, #ffb3c6);
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .hearts-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.4;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.4; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(220, 50, 100, 0.2);
      max-width: 480px;
      width: 90%;
    }

    .bear {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 16px;
      animation: bounce 1.2s ease-in-out infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    h1 {
      font-size: 1.8rem;
      color: #c0395a;
      margin-bottom: 36px;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    #yes-btn {
      background: linear-gradient(135deg, #ff4d80, #e0245e);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1.2rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(224, 36, 94, 0.4);
      transition: transform 0.15s, box-shadow 0.15s, font-size 0.3s, padding 0.3s;
    }

    #yes-btn:hover {
      transform: scale(1.07);
      box-shadow: 0 6px 20px rgba(224, 36, 94, 0.5);
    }

    #no-btn {
      background: #f0f0f0;
      color: #888;
      border: 2px solid #ddd;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.1s;
    }

    #no-btn:hover {
      transform: scale(0.95);
    }

    .success {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .success .big-heart {
      font-size: 6rem;
      animation: pop 0.4s ease-out;
    }

    @keyframes pop {
      0%   { transform: scale(0); }
      70%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .success p {
      font-size: 1.5rem;
      color: #c0395a;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="hearts-bg"></div>

  <div class="card" id="main-card">
    <div class="bear">🐻</div>
    <h1>Will you be my Valentine? 💕</h1>
    <div class="buttons" id="btn-group">
      <button id="yes-btn" onclick="sayYes()">Yes! 💖</button>
      <button id="no-btn" onclick="growYes()">No</button>
    </div>
    <div class="success" id="success-msg">
      <div class="big-heart">❤️</div>
      <p>Yay! I knew it! 🎉</p>
    </div>
  </div>

  <script>
    let noCount = 0;
    const yesFontSizes = [1.2, 1.5, 1.9, 2.4, 3.0, 3.7, 4.5];
    const noLabels = ["No", "Are you sure?", "Really?", "Think again!", "Last chance...", "Please? 🥺", "Fine... 😢"];

    function growYes() {
      noCount++;
      const yesBtn = document.getElementById('yes-btn');
      const noBtn  = document.getElementById('no-btn');

      const idx = Math.min(noCount, yesFontSizes.length - 1);
      const size = yesFontSizes[idx];
      yesBtn.style.fontSize  = size + 'rem';
      yesBtn.style.padding   = (10 + noCount * 4) + 'px ' + (28 + noCount * 8) + 'px';

      noBtn.textContent = noLabels[Math.min(noCount, noLabels.length - 1)];

      if (noCount >= 5) {
        noBtn.style.fontSize = '0.6rem';
        noBtn.style.padding  = '4px 10px';
      }
    }

    function sayYes() {
      document.getElementById('btn-group').style.display = 'none';
      document.querySelector('.bear').style.display = 'none';
      document.querySelector('h1').style.display = 'none';
      const msg = document.getElementById('success-msg');
      msg.style.display = 'flex';
      launchConfetti();
    }

    function launchConfetti() {
      const bg = document.getElementById('hearts-bg');
      const emojis = ['❤️','💕','💖','💗','💓','🌹','✨'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left     = Math.random() * 100 + 'vw';
        el.style.fontSize = (1 + Math.random() * 2) + 'rem';
        el.style.animationDuration  = (3 + Math.random() * 4) + 's';
        el.style.animationDelay     = (Math.random() * 2) + 's';
        bg.appendChild(el);
      }
    }

    // Generate background floating hearts on load
    (function seedHearts() {
      const bg = document.getElementById('hearts-bg');
      for (let i = 0; i < 15; i++) {
        const el = document.createElement('div');
        el.className = 'heart-float';
        el.textContent = ['❤️','💕','💖'][Math.floor(Math.random() * 3)];
        el.style.left     = Math.random() * 100 + 'vw';
        el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
        el.style.animationDuration = (6 + Math.random() * 8) + 's';
        el.style.animationDelay    = (Math.random() * 8) + 's';
        bg.appendChild(el);
      }
    })();
  </script>
</body>
</html>
